<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>Social Media Icons Popup hover effect | @CodewithRachit</title>
  <style>
    @import url('https://googleapis.com');

body {
  margin: 0;
  padding:0;
  background: #0f172a;
  font-family: 'Poppins',
   sans-serif;
  overflow: hidden;
}

ul {
  list-style: none;
}

.social-icons {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.social-icons .icon-content {
  margin: 0 10px;
  position: relative;
}
.social-icons .icon-content .tooltip {
  position: absolute;
  top: -30px;
  left: 50%;
  transform: translateX(-50%);
  color: #fff;
  padding: 6px 10px;
  border-radius: 5px;
  opacity: 0;
  visibility: hidden;
  font-size: 14px;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
.social-icons .icon-content:hover .tooltip {
  opacity: 1;
  visibility: visible;
  top: -50px;
}
.social-icons .icon-content a {
  position: relative;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  width: 55px;
  height:55px;
  border-radius: 50%;
  color: #94a3b8; 
  background-color: transparent; 
  border: 1px solid 
  rgba(255, 255, 255, 0.15);
  transition: all 0.3s ease-in-out;
}
.social-icons .icon-content a:hover {
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
  border-color: transparent;
}
.social-icons .icon-content a svg {
  position: relative;
  z-index: 1;
  width: 30px;
  height: 30px;
}
.social-icons .icon-content a:hover {
  color: white;
}
.social-icons .icon-content a .filled {
  position: absolute;
  top: auto;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 0;
  background-color: #000;
  transition: all 0.3s ease-in-out;
}
.social-icons .icon-content a:hover .filled {
  height: 100%;
}

/* Discord Colors */
.social-icons .icon-content a[data-social="discord"] .filled,
.social-icons .icon-content a[data-social="discord"] ~ .tooltip {
  background-color: #5865F2;
}

.social-icons .icon-content a[data-social="github"] .filled,
.social-icons .icon-content a[data-social="github"] ~ .tooltip {
  background-color: #24262a;
}

.social-icons .icon-content a[data-social="instagram"] .filled,
.social-icons .icon-content a[data-social="instagram"] ~ .tooltip {
  background: linear-gradient(
    45deg,
    #405de6,
    #5b51db,
    #b33ab4,
    #c135b4,
    #e1306c,
    #fd1f1f
  );
}

.social-icons .icon-content a[data-social="youtube"] .filled,
.social-icons .icon-content a[data-social="youtube"] ~ .tooltip {
  background-color: #ff0000;
}
  </style>
