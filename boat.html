<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>2D Ocean Storm</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:linear-gradient(#0b1c2c,#02060d);
    font-family:sans-serif;
}

canvas{
    display:block;
}
</style>
</head>

<body>
<canvas id="storm"></canvas>

<script>
const canvas = document.getElementById("storm");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
window.onresize = resize;

/* ======================
   WAVES
====================== */

let time = 0;

function getWaveY(x){
    return canvas.height*0.6 +
        Math.sin(x*0.005 + time)*30 +
        Math.sin(x*0.01 + time*1.5)*20;
}

function drawWaves(){

    ctx.beginPath();
    ctx.moveTo(0,canvas.height);

    for(let x=0;x<canvas.width;x+=10){
        ctx.lineTo(x,getWaveY(x));
    }

    ctx.lineTo(canvas.width,canvas.height);
    ctx.closePath();

    let grad = ctx.createLinearGradient(0,canvas.height*0.5,0,canvas.height);
    grad.addColorStop(0,"#1c3d5c");
    grad.addColorStop(1,"#02121f");

    ctx.fillStyle = grad;
    ctx.fill();
}

/* ======================
   SHIP
====================== */

function drawShip(){

    let x = canvas.width*0.5;
    let y = getWaveY(x);

    let slope =
        getWaveY(x+5) -
        getWaveY(x-5);

    let angle = slope * 0.02;

    ctx.save();
    ctx.translate(x,y-20);
    ctx.rotate(angle);

    // ship body
    ctx.fillStyle="#3b2a1c";
    ctx.beginPath();
    ctx.moveTo(-40,0);
    ctx.lineTo(40,0);
    ctx.lineTo(25,15);
    ctx.lineTo(-25,15);
    ctx.closePath();
    ctx.fill();

    // mast
    ctx.fillStyle="#222";
    ctx.fillRect(-2,-40,4,40);

    // sail
    ctx.fillStyle="#ddd";
    ctx.beginPath();
    ctx.moveTo(0,-40);
    ctx.lineTo(25,-20);
    ctx.lineTo(0,-20);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
}

/* ======================
   RAIN + RIPPLE
====================== */

let rain=[];
let ripples=[];

for(let i=0;i<200;i++){
    rain.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        speed:4+Math.random()*4
    });
}

function drawRain(){

    ctx.strokeStyle="rgba(180,200,255,0.6)";
    ctx.lineWidth=1;

    rain.forEach(r=>{
        ctx.beginPath();
        ctx.moveTo(r.x,r.y);
        ctx.lineTo(r.x+2,r.y+10);
        ctx.stroke();

        r.y+=r.speed;

        let waterY = getWaveY(r.x);

        if(r.y>waterY){
            ripples.push({
                x:r.x,
                y:waterY,
                radius:2,
                alpha:0.6
            });

            r.y=0;
            r.x=Math.random()*canvas.width;
        }
    });
}

/* ======================
   RIPPLE EFFECT
====================== */

function drawRipples(){

    ripples.forEach((rp,i)=>{
        ctx.beginPath();
        ctx.arc(rp.x,rp.y,rp.radius,0,Math.PI*2);
        ctx.strokeStyle=`rgba(200,220,255,${rp.alpha})`;
        ctx.stroke();

        rp.radius+=0.7;
        rp.alpha-=0.01;

        if(rp.alpha<=0) ripples.splice(i,1);
    });
}

/* ======================
   LIGHTNING
====================== */

let lightningTimer = 0;
let lightningFlash = 0;

function drawLightning(){

    if(Math.random()<0.004){
        lightningFlash=1;
        lightningTimer=10;
    }

    if(lightningTimer>0){
        ctx.strokeStyle="white";
        ctx.lineWidth=2;

        ctx.beginPath();

        let x=Math.random()*canvas.width;
        ctx.moveTo(x,0);

        for(let y=0;y<300;y+=20){
            x+=Math.random()*40-20;
            ctx.lineTo(x,y);
        }

        ctx.stroke();

        ctx.fillStyle=`rgba(255,255,255,${lightningFlash*0.2})`;
        ctx.fillRect(0,0,canvas.width,canvas.height);

        lightningFlash*=0.7;
        lightningTimer--;
    }
}

/* ======================
   SKY CLOUDS
====================== */

function drawSky(){
    let grad = ctx.createLinearGradient(0,0,0,canvas.height*0.6);
    grad.addColorStop(0,"#0a1623");
    grad.addColorStop(1,"#1a2c3f");
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);
}

/* ======================
   ANIMATION LOOP
====================== */

function animate(){

    time+=0.02;

    drawSky();
    drawRain();
    drawWaves();
    drawRipples();
    drawShip();
    drawLightning();

    requestAnimationFrame(animate);
}

animate();

</script>
</body>
</html>
